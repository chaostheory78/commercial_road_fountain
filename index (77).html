<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>The Spiral Project</title>

  <!-- ============================================================
       MindAR + A-Frame: image tracking AR library
       These two scripts are ALL you need — no npm, no installs.
  ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* Remove any white border/margin around the camera view */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Full-screen AR scene */
    a-scene { width: 100vw; height: 100vh; }

    /* Simple "scanning" message shown while camera loads */
    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 999;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div id="hint">Point camera at the Commercial Road Fountain</div>

  <!-- ============================================================
       THE AR SCENE
       Key attributes explained:
       • mindar-image         — enables image tracking
       • imageTargetSrc       — path to your compiled .mind file
       • renderer="alpha:true"— THIS is what makes background transparent
       • vr-mode-ui           — hides the VR goggles button
       • embedded             — makes the scene fill the page properly
  ============================================================ -->
  <a-scene
    mindar-image="imageTargetSrc: ./commercial_road_fountain.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    renderer="colorManagement: true; alpha: true;"
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >

    <!-- Camera: look-controls disabled so it doesn't move with device tilt -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ============================================================
         TARGET 0 — first image in your .mind file
         Everything inside this entity appears ON TOP of the image
         when the camera recognises it.
    ============================================================ -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!--
        FIBONACCI SPIRAL RINGS
        Radii follow the golden ratio (×1.618 each time):
        0.08 → 0.13 → 0.21 → 0.34 → 0.55
        Each ring spins on a different axis and speed.
      -->

      <!-- Ring 1 — innermost, gold, spins on Z -->
      <a-torus
        position="0 0 0.001"
        radius="0.08"
        radius-tubular="0.004"
        color="#FFD700"
        animation="property: rotation; to: 0 0 360; loop: true; dur: 2000; easing: linear;">
      </a-torus>

      <!-- Ring 2 — orange, spins on X -->
      <a-torus
        position="0 0 0.001"
        radius="0.13"
        radius-tubular="0.004"
        color="#FF6B35"
        animation="property: rotation; to: 360 0 0; loop: true; dur: 3000; easing: linear;">
      </a-torus>

      <!-- Ring 3 — pink, spins on Y -->
      <a-torus
        position="0 0 0.001"
        radius="0.21"
        radius-tubular="0.004"
        color="#E91E8C"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear;">
      </a-torus>

      <!-- Ring 4 — cyan, spins diagonally -->
      <a-torus
        position="0 0 0.001"
        radius="0.34"
        radius-tubular="0.004"
        color="#00BCD4"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 8000; easing: linear;">
      </a-torus>

      <!-- Ring 5 — purple, outermost, slow spin -->
      <a-torus
        position="0 0 0.001"
        radius="0.55"
        radius-tubular="0.004"
        color="#9C27B0"
        animation="property: rotation; to: 0 0 -360; loop: true; dur: 13000; easing: linear;">
      </a-torus>

      <!--
        CENTRE SPHERE — glows gold in the middle
        Scale animates to give a subtle pulse
      -->
      <a-sphere
        position="0 0 0.01"
        radius="0.03"
        color="#FFD700"
        opacity="0.9"
        animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine;">
      </a-sphere>

    </a-entity>
    <!-- End of target 0 -->

  </a-scene>

  <script>
    // Hide the hint message once the scene loads
    document.querySelector('a-scene').addEventListener('loaded', function () {
      console.log('Scene loaded — camera should be live');
    });

    // Optional: hide hint when a target is found
    document.querySelector('[mindar-image-target]').addEventListener('targetFound', function () {
      document.getElementById('hint').style.display = 'none';
    });

    document.querySelector('[mindar-image-target]').addEventListener('targetLost', function () {
      document.getElementById('hint').style.display = 'block';
    });
  </script>

</body>
</html>
